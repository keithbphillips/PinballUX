name: Build AppImage

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 20.04 ships glibc 2.31, which gives broad compatibility with
    # most Linux distros released since 2021 (Debian 11, Fedora 35+, Arch, etc.)
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libgl1-mesa-glx \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav gstreamer1.0-gl

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: PinballUX-AppImage
          path: PinballUX-*.AppImage
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: PinballUX-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
